name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "CBrainIOS/**"
      - "CBrainIOS.xcodeproj/**"
      - "Scripts/**"
      - ".github/workflows/build-ios.yml"

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build IPA
        run: bash Scripts/package_ipa.sh

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CBrainIOS-ipa
          path: build/ipa/CBrainIOS.ipa

