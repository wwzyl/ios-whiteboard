name: Build iOS IPA Direct

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build IPA
        run: |
          bash Scripts/package_ipa.sh

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: xcodebuild-log
          path: build/xcodebuild.log

      - uses: actions/upload-artifact@v4
        with:
          name: UNZIP-FIRST-CBrainIOS-installables
          path: |
            build/ipa/CBrainIOS.ipa
            build/ipa/CBrainIOS.tipa
